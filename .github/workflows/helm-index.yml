name: Update Helm Repository Index

# Triggers:
#   - workflow_run on CI completion: fires after a tag-push CI run finishes
#     successfully. We use workflow_run rather than `release: published`
#     because release events created via secrets.GITHUB_TOKEN do NOT trigger
#     downstream workflows (a GitHub Actions safety behavior). workflow_run
#     events bypass that restriction.
#   - workflow_dispatch: manual catchup if anything ever falls behind.
on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-index:
    runs-on: ubuntu-latest
    # Run for manual dispatch always; for workflow_run, only when CI succeeded
    # on a tag push. workflow_run.head_branch is the tag name for tag pushes.
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.event == 'push' &&
       startsWith(github.event.workflow_run.head_branch, 'v'))
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 0

      - name: Install chart-releaser
        uses: helm/chart-releaser-action@v1.7.0
        with:
          install_only: true

      - name: Download chart packages from releases
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p .cr-release-packages
          # Download all chart packages from GitHub Releases
          for tag in $(gh release list --json tagName -q '.[].tagName' --limit 50); do
            url="https://github.com/purelb/purelb/releases/download/${tag}/purelb-${tag}.tgz"
            if curl -sfI "$url" > /dev/null 2>&1; then
              echo "Downloading purelb-${tag}.tgz"
              curl -sLo ".cr-release-packages/purelb-${tag}.tgz" "$url"
            fi
          done
          ls -la .cr-release-packages/

      - name: Generate Helm repository index
        env:
          CR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p website/static/charts

          # cr index generates index.yaml with correct GitHub Release URLs
          # --release-name-template: our releases are tagged v0.14.1, not purelb-v0.14.1
          # --pages-branch main: we commit to main, not gh-pages
          cr index --owner purelb --git-repo purelb \
            --index-path website/static/charts/index.yaml \
            --pages-branch main \
            --release-name-template '{{ .Version }}'

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add website/static/charts/index.yaml
          if ! git diff --staged --quiet; then
            git commit -m "Update Helm repository index"
            git push
          fi
