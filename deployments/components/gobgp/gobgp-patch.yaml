apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: lbnodeagent
  namespace: purelb-system
spec:
  template:
    spec:
      volumes:
      - name: gobgp-socket
        emptyDir: {}
      - name: tmp
        emptyDir: {}
      containers:
      - name: k8gobgp
        image: ghcr.io/purelb/k8gobgp:0.2.3
        imagePullPolicy: IfNotPresent
        env:
        - name: NODE_NAME
          valueFrom:
            fieldRef:
              fieldPath: spec.nodeName
        - name: POD_NAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        - name: POD_NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
        - name: USE_UNIX_SOCKET
          value: "true"
        - name: GOBGP_SOCKET
          value: "/var/run/gobgp/gobgp.sock"
        - name: GOBGP_TARGET
          value: "unix:///var/run/gobgp/gobgp.sock"
        - name: PATH
          value: "/usr/local/bin:/usr/bin:/bin:/sbin"
        ports:
        - containerPort: 179
          hostPort: 179
          name: bgp
          protocol: TCP
        - containerPort: 7473
          name: gobgp-metrics
        - containerPort: 7474
          name: gobgp-health
        startupProbe:
          httpGet:
            path: /readyz
            port: 7474
          initialDelaySeconds: 5
          periodSeconds: 5
          failureThreshold: 12
        livenessProbe:
          httpGet:
            path: /healthz
            port: 7474
          initialDelaySeconds: 15
          periodSeconds: 20
        readinessProbe:
          httpGet:
            path: /readyz
            port: 7474
          initialDelaySeconds: 5
          periodSeconds: 10
        securityContext:
          allowPrivilegeEscalation: false
          runAsNonRoot: false
          capabilities:
            add:
            - NET_ADMIN
            - NET_BIND_SERVICE
            - NET_RAW
            drop:
            - ALL
          readOnlyRootFilesystem: true
        resources:
          requests:
            cpu: 100m
            memory: 64Mi
          limits:
            cpu: 500m
            memory: 256Mi
        volumeMounts:
        - name: gobgp-socket
          mountPath: /var/run/gobgp
        - name: tmp
          mountPath: /tmp
