apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: lbnodeagent
  namespace: purelb-system
spec:
  template:
    spec:
      volumes:
      - name: gobgp-socket
        emptyDir: {}
      containers:
      - name: k8gobgp
        image: ghcr.io/purelb/k8gobgp:0.2.2
        imagePullPolicy: IfNotPresent
        env:
        - name: NODE_NAME
          valueFrom:
            fieldRef:
              fieldPath: spec.nodeName
        - name: POD_NAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        - name: POD_NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
        ports:
        - containerPort: 7473
          name: gobgp-metrics
        - containerPort: 7474
          name: gobgp-health
        startupProbe:
          httpGet:
            path: /readyz
            port: 7474
          initialDelaySeconds: 5
          periodSeconds: 5
          failureThreshold: 12
        livenessProbe:
          httpGet:
            path: /healthz
            port: 7474
        readinessProbe:
          httpGet:
            path: /readyz
            port: 7474
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            add:
            - NET_ADMIN
            - NET_BIND_SERVICE
            - NET_RAW
            drop:
            - ALL
          readOnlyRootFilesystem: true
        resources:
          requests:
            cpu: 250m
            memory: 128Mi
          limits:
            cpu: 1000m
            memory: 512Mi
        volumeMounts:
        - name: gobgp-socket
          mountPath: /var/run/gobgp
