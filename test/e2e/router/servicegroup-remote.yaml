---
apiVersion: purelb.io/v2
kind: ServiceGroup
metadata:
  name: remote
  namespace: purelb-system
spec:
  remote:
    v4pools:
    - aggregation: /32
      pool: 10.255.0.100-10.255.0.150
      subnet: 10.255.0.0/24
    v6pools:
    - aggregation: /128
      pool: fd00:10:255::100-fd00:10:255::150
      subnet: fd00:10:255::/64
