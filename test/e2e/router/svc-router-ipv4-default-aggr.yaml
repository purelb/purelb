---
apiVersion: v1
kind: Service
metadata:
  name: router-test-ipv4-defaggr
  namespace: test
  labels:
    test-suite: router
  annotations:
    purelb.io/service-group: remote-default-aggr
spec:
  type: LoadBalancer
  ipFamilyPolicy: SingleStack
  ipFamilies:
  - IPv4
  selector:
    app: nginx
  ports:
  - port: 80
    targetPort: 80
