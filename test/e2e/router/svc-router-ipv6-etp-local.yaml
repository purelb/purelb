---
apiVersion: v1
kind: Service
metadata:
  name: router-test-ipv6-local
  namespace: test
  labels:
    test-suite: router
  annotations:
    purelb.io/service-group: remote
spec:
  type: LoadBalancer
  externalTrafficPolicy: Local
  ipFamilyPolicy: SingleStack
  ipFamilies:
  - IPv6
  selector:
    app: nginx
  ports:
  - port: 80
    targetPort: 80
