---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  labels:
    {{- include "purelb.labels" . | nindent 4 }}
  name: purelb:allocator:leases
  namespace: {{ .Release.Namespace }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: purelb:allocator:leases
subjects:
- kind: ServiceAccount
  name: allocator
